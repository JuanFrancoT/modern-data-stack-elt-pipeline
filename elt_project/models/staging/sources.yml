version: 2

sources:
  - name: raw
    database: ELT_DB
    schema: raw

    tables:
      - name: orders
        description: "Raw orders data loaded from S3"

        loaded_at_field: order_purchase_timestamp

        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 2, period: day}
        
        columns:
          - name: order_id
            tests:
              - not_null
              - unique

          - name: customer_id
            tests:
              - not_null

          - name: order_status
            tests:
              - not_null